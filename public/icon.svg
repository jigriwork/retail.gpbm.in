<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background squircle -->
  <rect width="512" height="512" rx="108" fill="#0A0A0A"/>

  <!-- G letterform built from a thick stroked arc + crossbar -->
  <!-- Outer arc: almost-complete circle, open on upper-right -->
  <circle cx="230" cy="256" r="110" fill="none" stroke="#FAFAF7" stroke-width="44" stroke-dasharray="605 88" stroke-dashoffset="-44" stroke-linecap="round"/>
  <!-- Horizontal crossbar of the G -->
  <line x1="230" y1="256" x2="310" y2="256" stroke="#FAFAF7" stroke-width="44" stroke-linecap="round"/>

  <!-- Three ascending growth bars -->
  <rect x="334" y="236" width="20" height="64" rx="5" fill="#FAFAF7" opacity="0.4"/>
  <rect x="364" y="196" width="20" height="104" rx="5" fill="#FAFAF7" opacity="0.65"/>
  <rect x="394" y="150" width="20" height="150" rx="5" fill="#FAFAF7"/>
</svg>
